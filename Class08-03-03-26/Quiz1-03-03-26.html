<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Styling</title>
    <style>
        #a{font-weight: bold;}
        #b{font-style: italic;}
        #c{text-decoration: underline;}
        #d{font-weight: bold;
           font-style: italic;}
        #e{font-weight: bold;
        text-decoration: underline;}

    </style>
</head>
<body>
    <ol>
        <li id="a">one</li>
        <li id="b">two</li>
        <li id="c">three</li>
        <li id="d">four</li>
        <li id="e">five</li>

    </ol>
</body>
</html>
