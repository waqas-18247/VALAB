<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Styling</title>
    <style>
      table{
       border: solid 2px;
        border-collapse: collapse;
        margin: 50px;
        text-align: center;
      }
      th, td{
        
        padding: 10px;
      }
      th{background-color: gray;}
      td:nth-child(3){font-weight: bold;}
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>ali</td>
            <td>100</td>
            <td>86</td>
        </tr>
        <tr>
            <td>ahmed</td>
            <td>101</td>
            <td>87</td>
        </tr>
          <tr>
            <td>noman</td>
            <td>102</td>
            <td>88</td>
        </tr>
          <tr>
            <td>saqib</td>
            <td>103</td>
            <td>89</td>
        </tr>
    </table>
</body>
</html>
